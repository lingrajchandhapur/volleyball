name: volleyball-game

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:

  frontend:
    runs-on: ubuntu-22.04
    environment: DEVOPS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 Cache npm
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Verify frontend server starts
        run: node server.js & sleep 5
        working-directory: frontend

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image (frontend)
        run: |
          docker build -t $DOCKERHUB_USERNAME/volleyball-frontend:$IMAGE_TAG frontend
          docker build -t $DOCKERHUB_USERNAME/volleyball-frontend:latest frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/volleyball-frontend:${{ env.IMAGE_TAG }}

      - name: Push frontend image
        run: |
          docker push $DOCKERHUB_USERNAME/volleyball-frontend:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/volleyball-frontend:latest


  backend:
    runs-on: ubuntu-22.04
    needs: frontend
    environment: DEVOPS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 Cache pip
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify backend server starts
        run: python app.py & sleep 5
        working-directory: backend

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image (backend)
        run: |
          docker build -t $DOCKERHUB_USERNAME/volleyball-backend:$IMAGE_TAG backend
          docker build -t $DOCKERHUB_USERNAME/volleyball-backend:latest backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/volleyball-backend:${{ env.IMAGE_TAG }}

      - name: Push backend image
        run: |
          docker push $DOCKERHUB_USERNAME/volleyball-backend:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/volleyball-backend:latest


  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: backend   # ✅ runs after backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=YOUR_PROJECT_KEY
            -Dsonar.organization=YOUR_ORG
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
