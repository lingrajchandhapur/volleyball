name: frontend-reusable

on:
  workflow_call:
    secrets:
      DOCKERHUB_TOKEN:
        required: true
    inputs:
      IMAGE_TAG:
        required: true
        type: string

jobs:
  frontend:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Login Docker
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:${{ inputs.IMAGE_TAG }} frontend
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:latest frontend

      - name: Push image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:${{ inputs.IMAGE_TAG }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/volleyball-frontend:latest
